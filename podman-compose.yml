version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: nadiaris_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ahu123
      POSTGRES_DB: threat_audit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: nadiaris_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
